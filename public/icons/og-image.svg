<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Open Graph share card. 1200×630 is the canonical OG size; works on
       WeChat link preview, Twitter (summary_large_image), Facebook, etc. -->
  <defs>
    <radialGradient id="ogBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="ogGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogTitleShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Subtle starfield (handful of dots in random positions) -->
  <g fill="#f5f0e8" opacity="0.35">
    <circle cx="120" cy="80" r="1"/>
    <circle cx="280" cy="140" r="1.5"/>
    <circle cx="180" cy="240" r="1"/>
    <circle cx="60" cy="380" r="1.5"/>
    <circle cx="220" cy="480" r="1"/>
    <circle cx="940" cy="100" r="1"/>
    <circle cx="1080" cy="180" r="1.5"/>
    <circle cx="1000" cy="320" r="1"/>
    <circle cx="1120" cy="450" r="1.5"/>
    <circle cx="880" cy="520" r="1"/>
    <circle cx="160" cy="560" r="1"/>
    <circle cx="1060" cy="560" r="1"/>
  </g>

  <!-- Centered mandala (compact version) on the left third -->
  <g transform="translate(260,315)">
    <circle cx="0" cy="0" r="135" fill="url(#ogGlow)"/>
    <g fill="none" stroke="#c9a84c">
      <circle cx="0" cy="0" r="130" stroke-opacity="0.55" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="100" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="4 6"/>
      <circle cx="0" cy="0" r="70" stroke-opacity="0.85" stroke-width="2"/>
      <circle cx="0" cy="0" r="40" stroke-opacity="0.65" stroke-width="1.5" stroke="#d4762a"/>
    </g>
    <circle cx="0" cy="0" r="11" fill="#c9a84c"/>
    <circle cx="0" cy="0" r="5" fill="#f5f0e8" opacity="0.85"/>
  </g>

  <!-- Subtitle (italic, parchment, small caps spread) -->
  <text x="540" y="200"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-style="italic" font-size="22" letter-spacing="6"
        fill="#f5f0e8" fill-opacity="0.55">
    PHILOSOPHICAL SOUL CARTOGRAPHY
  </text>

  <!-- Main title — 灵 魂 地 图 — gold with shine -->
  <text x="540" y="310"
        font-family="'Noto Serif SC', 'Songti SC', 'STSong', serif"
        font-size="84" font-weight="700" letter-spacing="14"
        fill="url(#ogTitleShine)">
    灵  魂  地  图
  </text>

  <!-- Hook line -->
  <text x="540" y="380"
        font-family="'Noto Serif SC', 'Songti SC', 'STSong', serif"
        font-size="28" letter-spacing="2"
        fill="#f5f0e8" fill-opacity="0.85">
    在被算法定义之前，先认识自己。
  </text>

  <!-- Bottom strip with meta -->
  <line x1="540" y1="430" x2="800" y2="430"
        stroke="#c9a84c" stroke-opacity="0.4" stroke-width="1"/>
  <text x="540" y="475"
        font-family="'Noto Serif SC', 'Songti SC', 'STSong', serif"
        font-size="20" letter-spacing="3"
        fill="#f5f0e8" fill-opacity="0.55">
    40 道题 · 16 种哲学原型 · 4 条灵魂经纬
  </text>
  <text x="540" y="535"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-style="italic" font-size="16" letter-spacing="4"
        fill="#c9a84c" fill-opacity="0.6">
    soulmap.games
  </text>
</svg>
